<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="logo-wrap">
        <img src="img/NASA-Logo-Large.jpg" alt="NASA logo" class="logo" />
        <span class="logo-glow" aria-hidden="true"></span>
      </div>
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button>Get Space Images</button>
    </div>

    <div id="didYouKnow" class="did-you-know" aria-live="polite"></div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <!-- Modal for full-size image / video -->
  <div id="modal" class="modal hidden" role="dialog" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content" role="document">
      <button id="modalClose" class="modal-close" aria-label="Close">✕</button>
      <div id="modalBody" class="modal-body">
        <!-- Filled dynamically -->
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
  <div class="shooting-star s1" aria-hidden="true"></div>
  <div class="shooting-star s2" aria-hidden="true"></div>
  <div class="shooting-star s3" aria-hidden="true"></div>
</body>
</html>
